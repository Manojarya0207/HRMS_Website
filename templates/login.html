{% extends "base.html" %}

{% block title %}Login - ATS HRMS{% endblock %}

{% block content %}
<div class="min-h-[90vh] flex items-center justify-center absolute inset-0 -z-10 h-full w-full bg-white [background:radial-gradient(125%_125%_at_50%_10%,#ffffff63_40%,#3b82f6_100%)] py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl transform transition-all hover:shadow-2xl">

        <div class="text-center">
            <div class="mx-auto h-16 w-16 flex items-center justify-center rounded-full ">
                <img src="static/images/ATS.png" alt="Community Logo" class="h-24 w-24 object-contain" />
            </div>
            <p class="mt-2 text-sm text-gray-500 font-medium">
                <b>HRMS</b>
            </p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            <div class="space-y-4">
                <div>
                    <label for="email" class="sr-only">Email address</label>
                    <input id="email" name="email" type="email" autocomplete="email" required 
                           class="appearance-none relative block w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm" 
                           placeholder="Login-Id">
                </div>
                <div class="relative">
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required 
                           class="appearance-none relative block w-full px-4 py-3 pr-10 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm" 
                           placeholder="Password">
                    <button type="button" onclick="togglePasswordVisibility('password', this)" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i class="far fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all duration-300 transform hover:scale-[1.02]">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-4">
                        <i class="fas fa-lock text-blue-200 group-hover:text-white transition-colors duration-300"></i>
                    </span>
                    Login
                </button>
            </div>
            
            <div class="text-center mt-4 flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 border-t border-gray-100 pt-4">
                <div>
                    <span class="text-sm text-gray-500">Not registered? </span>
                    <a href="{{ url_for('register') }}" class="text-sm font-bold text-blue-600 hover:text-blue-700 transition">Register Now</a>
                </div>
                <div class="hidden sm:block text-gray-300">|</div>
                <div>
                    <button type="button" onclick="openStatusModal()"
                        class="text-sm font-bold text-emerald-600 hover:text-emerald-700 transition focus:outline-none">Check Registration Status</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- STATUS CHECK MODAL -->
<div id="statusModal" class="fixed inset-0 z-50 hidden flex items-center justify-center">
    <!-- backdrop overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeStatusModal()"></div>
    
    <!-- modal body -->
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4 border border-gray-100 transform transition-all z-10">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-gray-900">Check Registration Status</h3>
            <button type="button" onclick="closeStatusModal()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>
        
        <div class="space-y-4">
            <div>
                <label for="status_email" class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1 text-left">Enter your Email Address</label>
                <input id="status_email" type="email" placeholder="name@company.com"
                       class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm">
            </div>
            
            <button type="button" onclick="submitStatusCheck()"
                    class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-all duration-300">
                Check Status
            </button>
            
            <!-- Result Area -->
            <div id="statusResult" class="hidden p-4 rounded-lg text-sm transition-all duration-300">
            </div>
        </div>
    </div>
</div>
<script>
    function togglePasswordVisibility(fieldId, btn) {
        const field = document.getElementById(fieldId);
        const icon = btn.querySelector('i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    }

    function openStatusModal() {
        document.getElementById('statusModal').classList.remove('hidden');
        document.getElementById('status_email').value = '';
        const resultDiv = document.getElementById('statusResult');
        resultDiv.classList.add('hidden');
        resultDiv.className = 'hidden p-4 rounded-lg text-sm transition-all duration-300';
        resultDiv.innerHTML = '';
    }

    function closeStatusModal() {
        document.getElementById('statusModal').classList.add('hidden');
    }

    function submitStatusCheck() {
        const email = document.getElementById('status_email').value.trim();
        const resultDiv = document.getElementById('statusResult');
        
        if (!email) {
            resultDiv.classList.remove('hidden');
            resultDiv.className = 'p-4 rounded-lg text-sm bg-red-50 text-red-700 font-medium mt-3 text-left border border-red-200';
            resultDiv.innerHTML = 'Please enter a valid email address.';
            return;
        }

        resultDiv.classList.remove('hidden');
        resultDiv.className = 'p-4 rounded-lg text-sm bg-gray-50 text-gray-600 mt-3 flex items-center justify-center gap-2 border border-gray-200';
        resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking status...';

        fetch('/api/check-registration-status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email: email })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                let statusColor = 'bg-yellow-50 text-yellow-800 border border-yellow-200';
                let icon = 'fa-clock';
                if (data.status === 'approved') {
                    statusColor = 'bg-green-50 text-green-800 border border-green-200';
                    icon = 'fa-check-circle';
                } else if (data.status === 'rejected') {
                    statusColor = 'bg-red-50 text-red-800 border border-red-200';
                    icon = 'fa-times-circle';
                }

                resultDiv.className = `p-4 rounded-lg text-sm mt-3 ${statusColor} space-y-1 text-left`;
                resultDiv.innerHTML = `
                    <div class="flex items-center gap-2 font-bold uppercase tracking-wider text-xs">
                        <i class="fas ${icon} text-base"></i> Status: ${data.status}
                    </div>
                    <div class="mt-2 text-gray-700">
                        <p><strong>Name:</strong> ${data.first_name} ${data.last_name}</p>
                        <p><strong>Department:</strong> ${data.department}</p>
                        <p><strong>Submitted:</strong> ${new Date(data.inserted_date).toLocaleDateString()}</p>
                    </div>
                `;
            } else {
                resultDiv.className = 'p-4 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200 font-medium mt-3 text-left';
                resultDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-1"></i> ${data.message}`;
            }
        })
        .catch(err => {
            resultDiv.className = 'p-4 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200 font-medium mt-3 text-left';
            resultDiv.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> An error occurred. Please try again.';
        });
    }
</script>
{% endblock %}
