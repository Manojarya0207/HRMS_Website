{% extends "layouts/base.html" %}

{% block title %}Employee Registration - ATS HRMS{% endblock %}

{% block content %}
<div
    class="min-h-screen flex items-center justify-center absolute inset-0 -z-10 h-full w-full bg-white [background:radial-gradient(125%_125%_at_50%_10%,#ffffff63_40%,#3b82f6_100%)] py-12 px-4 sm:px-6 lg:px-8">

    <!-- Increased max width to max-w-2xl for all fields -->
    <div
        class="max-w-2xl w-full space-y-6 bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transform transition-all hover:shadow-2xl">


        <!-- Logo & Title -->
        <div class="text-center">
            <div class="mx-auto h-16 w-16 flex items-center justify-center rounded-full ">
                <img src="static/images/ATS.png" alt="Community Logo" class="h-24 w-24 object-contain" />
            </div>
            <p class="mt-2 text-sm text-gray-500 font-medium">
                <b>HRMS</b>
            </p>
            <p class="text-sm text-gray-500 font-medium mt-1">Employee Registration Request</p>
        </div>

        <form class="space-y-4" method="POST" id="registerForm" oninput="validateForm()">
            <!-- Two column grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <!-- First Name -->
                <div>
                    <label for="first_name"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">First Name
                        <span class="text-red-500">*</span></label>
                    <input id="first_name" name="first_name" type="text" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                        placeholder="e.g. Manoj">
                </div>

                <!-- Last Name -->
                <div>
                    <label for="last_name"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Last Name
                        <span class="text-red-500">*</span></label>
                    <input id="last_name" name="last_name" type="text" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                        placeholder="e.g. Arya">
                </div>

                <!-- Gender -->
                <div>
                    <label for="gender"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Gender <span class="text-red-500">*</span></label>
                    <select id="gender" name="gender" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Date of Birth -->
                <div>
                    <label for="dob"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Date of Birth
                        <span class="text-red-500">*</span></label>
                    <input id="dob" name="dob" type="date" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm">
                </div>

                <!-- Address (Full Width) -->
                <div class="md:col-span-2">
                    <label for="address"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Address
                        <span class="text-red-500">*</span></label>
                    <textarea id="address" name="address" rows="2" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                        placeholder="Your residential address"></textarea>
                    <span id="address_status" class="text-[11px] text-gray-400 block mt-1">Address must be at least 5 characters</span>
                </div>

                <!-- Phone Number -->
                <div>
                    <label for="phone_no"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Phone Number
                        <span class="text-red-500">*</span></label>
                    <input id="phone_no" name="phone_no" type="tel" required maxlength="10"
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                        placeholder="10-digit number">
                </div>

                <!-- Email Address (Login ID) -->
                <div>
                    <label for="email"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Login ID
                        <span class="text-red-500">*</span></label>
                    <input id="email" name="email" type="email" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                        placeholder="name@company.com">
                </div>

                <!-- Department -->
                <div class="md:col-span-2">
                    <label for="department"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Department /
                        vertical <span class="text-red-500">*</span></label>
                    <select id="department" name="department" required
                        class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm">
                        <option value="" disabled selected>Select department</option>
                        <option value="IT">IT & Software</option>
                        <option value="HR">Human Resources</option>
                        <option value="Sales">Sales & Marketing</option>
                        <option value="Finance">Finance & Accounts</option>
                        <option value="Operations">Operations</option>
                    </select>
                </div>

                <!-- Password -->
                <div>
                    <label for="password"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Password
                        <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required
                            class="appearance-none relative block w-full px-3 py-2.5 pr-10 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                            placeholder="Minimum 6 characters">
                        <button type="button" onclick="togglePasswordVisibility('password', this)"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="far fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirm_password"
                        class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1">Confirm Password
                        <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <input id="confirm_password" name="confirm_password" type="password" required
                            class="appearance-none relative block w-full px-3 py-2.5 pr-10 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm"
                            placeholder="Re-enter password">
                        <button type="button" onclick="togglePasswordVisibility('confirm_password', this)"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="far fa-eye-slash"></i>
                        </button>
                    </div>
                </div>

                <div class="md:col-span-2">
                    <span id="password_match_status" class="text-[11px] text-gray-400 block">Passwords must match</span>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="pt-4">
                <button type="submit" id="submitBtn" disabled
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-all duration-300 transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-4">
                        <i
                            class="fas fa-paper-plane text-teal-200 group-hover:text-white transition-colors duration-300"></i>
                    </span>
                    SEND REGISTRATION REQUEST
                </button>
            </div>

            <div
                class="text-center mt-4 flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 border-t border-gray-100 pt-4">
                <div>
                    <span class="text-sm text-gray-500">Already registered? </span>
                    <a href="{{ url_for('auth.login') }}"
                        class="text-sm font-bold text-teal-600 hover:text-teal-700 transition">Sign In</a>
                </div>
                <div class="hidden sm:block text-gray-300">|</div>
                <div>
                    <button type="button" onclick="openStatusModal()"
                        class="text-sm font-bold text-emerald-600 hover:text-emerald-700 transition focus:outline-none">Check
                        Registration Status</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- STATUS CHECK MODAL -->
<div id="statusModal" class="fixed inset-0 z-50 hidden flex items-center justify-center">
    <!-- backdrop overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeStatusModal()"></div>

    <!-- modal body -->
    <div
        class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 mx-4 border border-gray-100 transform transition-all z-10">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-bold text-gray-900">Check Registration Status</h3>
            <button type="button" onclick="closeStatusModal()"
                class="text-gray-400 hover:text-gray-600 focus:outline-none">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <div class="space-y-4">
            <div>
                <label for="status_email"
                    class="block text-xs font-semibold text-gray-700 uppercase tracking-wider mb-1 text-left">Enter your
                    Email Address</label>
                <input id="status_email" type="email" placeholder="name@company.com"
                    class="appearance-none relative block w-full px-3 py-2.5 border border-gray-200 rounded-lg bg-gray-50 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent focus:bg-white transition-all duration-300 sm:text-sm">
            </div>

            <button type="button" onclick="submitStatusCheck()"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-gradient-to-r from-teal-500 to-emerald-600 hover:from-teal-600 hover:to-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-all duration-300">
                Check Status
            </button>

            <!-- Result Area -->
            <div id="statusResult" class="hidden p-4 rounded-lg text-sm transition-all duration-300">
            </div>
        </div>
    </div>
</div>

<script>
    function togglePasswordVisibility(fieldId, btn) {
        const field = document.getElementById(fieldId);
        const icon = btn.querySelector('i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        }
    }

    function validateForm() {
        const first_name = document.getElementById('first_name').value.trim();
        const last_name = document.getElementById('last_name').value.trim();
        const gender = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value;
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone_no').value.trim();
        const email = document.getElementById('email').value.trim();
        const dept = document.getElementById('department').value;
        const pwd = document.getElementById('password').value;
        const cpwd = document.getElementById('confirm_password').value;
        const submitBtn = document.getElementById('submitBtn');
        const matchStatus = document.getElementById('password_match_status');
        const addressStatus = document.getElementById('address_status');

        let isValid = true;

        if (first_name.length < 2) isValid = false;
        if (last_name.length < 1) isValid = false;
        if (!gender) isValid = false;
        if (!dob) isValid = false;

        // Address validation and error message styling
        if (address.length === 0) {
            addressStatus.textContent = 'Address must be at least 5 characters';
            addressStatus.className = 'text-[11px] text-gray-400 block mt-1';
            isValid = false;
        } else if (address.length < 5) {
            addressStatus.textContent = 'Address must be at least 5 characters';
            addressStatus.className = 'text-[11px] text-red-500 block font-semibold mt-1';
            isValid = false;
        } else {
            addressStatus.textContent = 'Address looks good';
            addressStatus.className = 'text-[11px] text-green-600 block font-semibold mt-1';
        }

        if (phone.length !== 10 || !/^\d{10}$/.test(phone)) isValid = false;
        if (!email || !email.includes('@')) isValid = false;
        if (!dept) isValid = false;
        if (pwd.length < 6) isValid = false;

        if (pwd !== cpwd) {
            isValid = false;
            if (cpwd.length > 0) {
                matchStatus.textContent = 'Passwords do not match';
                matchStatus.className = 'text-[11px] text-red-500 block font-semibold';
            }
        } else {
            if (pwd.length >= 6) {
                matchStatus.textContent = 'Passwords match';
                matchStatus.className = 'text-[11px] text-green-600 block font-semibold';
            } else {
                matchStatus.textContent = 'Passwords must match';
                matchStatus.className = 'text-[11px] text-gray-400 block';
            }
        }

        submitBtn.disabled = !isValid;
    }

    function openStatusModal() {
        document.getElementById('statusModal').classList.remove('hidden');
        document.getElementById('status_email').value = '';
        const resultDiv = document.getElementById('statusResult');
        resultDiv.classList.add('hidden');
        resultDiv.className = 'hidden p-4 rounded-lg text-sm transition-all duration-300';
        resultDiv.innerHTML = '';
    }

    function closeStatusModal() {
        document.getElementById('statusModal').classList.add('hidden');
    }

    function submitStatusCheck() {
        const email = document.getElementById('status_email').value.trim();
        const resultDiv = document.getElementById('statusResult');

        if (!email) {
            resultDiv.classList.remove('hidden');
            resultDiv.className = 'p-4 rounded-lg text-sm bg-red-50 text-red-700 font-medium mt-3 text-left border border-red-200';
            resultDiv.innerHTML = 'Please enter a valid email address.';
            return;
        }

        resultDiv.classList.remove('hidden');
        resultDiv.className = 'p-4 rounded-lg text-sm bg-gray-50 text-gray-600 mt-3 flex items-center justify-center gap-2 border border-gray-200';
        resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Checking status...';

        fetch('/api/check-registration-status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email: email })
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    let statusColor = 'bg-yellow-50 text-yellow-800 border border-yellow-200';
                    let icon = 'fa-clock';
                    if (data.status === 'approved') {
                        statusColor = 'bg-green-50 text-green-800 border border-green-200';
                        icon = 'fa-check-circle';
                    } else if (data.status === 'rejected') {
                        statusColor = 'bg-red-50 text-red-800 border border-red-200';
                        icon = 'fa-times-circle';
                    }

                    resultDiv.className = `p-4 rounded-lg text-sm mt-3 ${statusColor} space-y-1 text-left`;
                    resultDiv.innerHTML = `
                    <div class="flex items-center gap-2 font-bold uppercase tracking-wider text-xs">
                        <i class="fas ${icon} text-base"></i> Status: ${data.status}
                    </div>
                    <div class="mt-2 text-gray-700">
                        <p><strong>Name:</strong> ${data.first_name} ${data.last_name}</p>
                        <p><strong>Department:</strong> ${data.department}</p>
                        <p><strong>Submitted:</strong> ${new Date(data.inserted_date).toLocaleDateString()}</p>
                    </div>
                `;
                } else {
                    resultDiv.className = 'p-4 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200 font-medium mt-3 text-left';
                    resultDiv.innerHTML = `<i class="fas fa-exclamation-circle mr-1"></i> ${data.message}`;
                }
            })
            .catch(err => {
                resultDiv.className = 'p-4 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200 font-medium mt-3 text-left';
                resultDiv.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> An error occurred. Please try again.';
            });
    }
</script>
{% endblock %}
